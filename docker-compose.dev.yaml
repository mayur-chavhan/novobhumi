services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: novobhumi-dev
    command: npm run dev -- --host 0.0.0.0 --port 3737
    ports:
      - "3737:3737"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
