services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novobhumi
    restart: unless-stopped
    ports:
      - "4173:4173"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
