<svg width="90" height="120" viewBox="0 0 90 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sunflower -->
  <g opacity="0.3">
    <!-- Stem -->
    <rect x="42" y="50" width="6" height="55" rx="3" fill="#15803d"/>
    <!-- Leaves -->
    <ellipse cx="30" cy="75" rx="12" ry="8" fill="#16a34a" transform="rotate(-30 30 75)"/>
    <ellipse cx="60" cy="80" rx="12" ry="8" fill="#16a34a" transform="rotate(30 60 80)"/>
    <!-- Flower petals -->
    <ellipse cx="45" cy="35" rx="8" ry="12" fill="#fbbf24" transform="rotate(0 45 35)"/>
    <ellipse cx="45" cy="35" rx="8" ry="12" fill="#fbbf24" transform="rotate(45 45 35)"/>
    <ellipse cx="45" cy="35" rx="8" ry="12" fill="#fbbf24" transform="rotate(90 45 35)"/>
    <ellipse cx="45" cy="35" rx="8" ry="12" fill="#fbbf24" transform="rotate(135 45 35)"/>
    <ellipse cx="45" cy="35" rx="8" ry="12" fill="#f59e0b" transform="rotate(22.5 45 35)"/>
    <ellipse cx="45" cy="35" rx="8" ry="12" fill="#f59e0b" transform="rotate(67.5 45 35)"/>
    <ellipse cx="45" cy="35" rx="8" ry="12" fill="#f59e0b" transform="rotate(112.5 45 35)"/>
    <ellipse cx="45" cy="35" rx="8" ry="12" fill="#f59e0b" transform="rotate(157.5 45 35)"/>
    <!-- Center -->
    <circle cx="45" cy="35" r="10" fill="#78350f"/>
    <circle cx="45" cy="35" r="7" fill="#92400e"/>
  </g>
</svg>
