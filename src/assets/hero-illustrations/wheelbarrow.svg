    <circle cx="35" cy="70" r="10" fill="#78716c"/>
    <circle cx="35" cy="70" r="5" fill="#a8a29e"/>
    <!-- Barrow body -->
    <path d="M35 55 L25 40 L70 35 L80 50 L35 55 Z" fill="#dc2626"/>
    <path d="M35 55 L28 42 L70 37 L78 50 L35 55 Z" fill="#ef4444"/>
